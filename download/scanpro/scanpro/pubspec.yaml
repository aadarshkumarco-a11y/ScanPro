name: scanpro
description: Professional document scanning app with OCR, PDF tools, AI features, and cloud sync
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.2.0
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  google_sign_in: ^6.2.1
  
  # OCR
  google_mlkit_text_recognition: ^0.12.0
  google_mlkit_language_id: ^0.11.0
  google_mlkit_translation: ^0.11.0
  
  # PDF
  syncfusion_flutter_pdf: ^25.1.35
  syncfusion_flutter_pdfviewer: ^25.1.35
  
  # Camera & Image
  camera: ^0.11.0
  image_picker: ^1.1.0
  photo_manager: ^3.2.0
  
  # Image Processing
  opencv_dart: ^1.0.0
  
  # AI
  google_generative_ai: ^0.4.0
  
  # Security
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.0
  encrypt: ^5.0.3
  
  # Storage & Files
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  share_plus: ^9.0.0
  file_picker: ^8.0.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  url_launcher: ^6.3.0
  screenshot: ^3.0.0
  
  # QR/Barcode
  mobile_scanner: ^5.1.0
  
  # Background
  workmanager: ^0.5.2
  flutter_local_notifications: ^17.1.0
  
  # UI
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  
  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.5
  freezed_annotation: ^2.4.3
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.3
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: ScanProIcons
      fonts:
        - asset: assets/fonts/ScanProIcons.ttf
